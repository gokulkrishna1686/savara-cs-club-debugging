<!DOCTYPE html>
<html>
<body>

<div id="orders"></div>

<script>
fetch("http://localhost:5000/api/orders")
.then(r => r.json())
.then(d => {
  const container = document.getElementById("orders");
  d.forEach(o => {
    const p = document.createElement("p");
    p.textContent = o.name + " " + ("**** **** **** " + String(o.card).slice(-4));
    container.appendChild(p);
  });
});
</script>

</body>
</html>
