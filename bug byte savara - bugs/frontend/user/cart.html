<!DOCTYPE html>
<html>
<head>
<title>Cart - BugByte</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="content">
  <div class="page-header" style="padding:0 0 20px">
    <h2>Your Cart</h2>
  </div>

  <p id="emptyMsg" style="color:#64748b">Your cart is empty. <a href="home.html" class="page-link">Browse products</a></p>

  <div id="cartItems"></div>

  <div id="checkoutLink" style="display:none; margin-top:20px">
    <a href="checkout.html"><button>Proceed to Checkout</button></a>
  </div>
</div>

<script>
const cart = JSON.parse(localStorage.getItem("cartItems")) || [];

if (cart.length > 0) {
  document.getElementById("emptyMsg").style.display = "none";
  document.getElementById("checkoutLink").style.display = "block";
  const container = document.getElementById("cartItems");
  cart.forEach(i => {
    const div = document.createElement("div");
    div.className = "cart-item";
    const name = document.createElement("span");
    name.textContent = i.name;
    const price = document.createElement("span");
    price.className = "price";
    price.textContent = "₹" + i.price;
    div.appendChild(name);
    div.appendChild(price);
    container.appendChild(div);
  });
}
</script>

</body>
</html>
