<!DOCTYPE html>
<html>
<head>
<title>Checkout - BugByte</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div class="content">
  <div class="checkout-box">
    <h2>Checkout</h2>

    <input id="name" placeholder="Enter your name">
    <input id="card" placeholder="Enter card number">

    <div class="checkout-total" id="total">Total: ₹0</div>

    <button onclick="placeOrder()" style="width:100%; margin-top:16px">Pay Now</button>

    <a href="cart.html" class="page-link">← Back to Cart</a>
  </div>
</div>

<script src="../js/app.js"></script>
<script>
const items = JSON.parse(localStorage.getItem("cartItems")) || [];
const total = items.reduce((sum, i) => sum + i.price, 0);
document.getElementById("total").textContent = "Total: ₹" + total;
</script>
</body>
</html>
